name: Package versioning and release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-release:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # 2. Set up Bun
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      # 3. Install dependencies
      - name: Install dependencies
        run: bun install

      # 4. Run tests
      #      - name: Run tests
      #        run: bun run test

      # 5. Build library
      - name: Build library
        run: bun run build

      # 6. Configure git for committing version bump
      - name: Configure git for push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      # 7. Bump version (patch by default)
      - name: Bump version
        id: bump
        run: |
          # Change 'patch' to 'minor' or 'major' if needed
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # 8. Commit version bump
      - name: Commit version bump
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"

      # 9. Create git tag
      - name: Create git tag
        run: |
          TAG=${{ steps.bump.outputs.new_version }}
          git tag $TAG
          git push origin main
          git push origin $TAG
      

      # 10. Create GitHub release
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.bump.outputs.new_version }}
          name: Release ${{ steps.bump.outputs.new_version }}
          body: "Automated release from workflow"
